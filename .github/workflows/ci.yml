name: CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build verification
        run: npm run test:build

  electron-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Electron render smoke test
        env:
          LEPTON_SMOKE_NO_SANDBOX: '1'
        run: xvfb-run --auto-servernum npm run test:smoke

      - name: Electron login-flow smoke test
        env:
          LEPTON_SMOKE_NO_SANDBOX: '1'
        run: xvfb-run --auto-servernum npm run test:login-flow

  packaged-smoke:
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Packaged Electron smoke test
        env:
          CSC_FOR_PULL_REQUEST: 'true'
        run: npm run test:packaged-smoke
